name = "cf-probe-monitor"
main = "probe monitor.js"
compatibility_date = "2024-01-15"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "probe-monitor-db"
database_id = "your-database-id-here"  # 运行 wrangler d1 create probe-monitor-db 后替换此 ID

# 环境变量（也可以在 Cloudflare Dashboard 中设置）
[vars]
# API_SECRET = "your-secret-password"  # 取消注释并设置你的密码

# 生产环境配置
[env.production]
name = "cf-probe-monitor"
route = { pattern = "your-domain.com/*", zone_name = "your-domain.com" }

# 开发环境配置
[env.dev]
name = "cf-probe-monitor-dev"
